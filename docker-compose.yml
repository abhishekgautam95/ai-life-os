services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-life-copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_life_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ai-life-copilot-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      NODE_ENV: development
      APP_BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_life_os?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_TRANSPORT: ${TELEGRAM_TRANSPORT:-polling}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Kolkata}
      SCHEDULER_INTERVAL_MS: ${SCHEDULER_INTERVAL_MS:-60000}
    ports:
      - "3001:3001"

volumes:
  postgres_data:
